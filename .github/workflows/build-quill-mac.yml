name: Build Quill (macOS)

on:
  workflow_dispatch:          # run manually from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - 'Quill/src-tauri/**'
      - 'Quill/ui/**'
      - 'Quill/package.json'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write         # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Quill/src-tauri -> target

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install UI dependencies
        working-directory: Quill/ui
        run: npm install

      - name: Install Tauri CLI
        working-directory: Quill
        run: npm install

      - name: Build (Tauri)
        working-directory: Quill
        run: npx tauri build

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: quill-latest
          name: Quill (latest)
          body: |
            Latest macOS build of Quill — updated automatically on every push.

            **Install:** open the DMG, drag Quill to Applications.
          prerelease: false
          make_latest: true
          files: Quill/src-tauri/target/release/bundle/dmg/*.dmg
