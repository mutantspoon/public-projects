name: Build Quill

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Quill/src-tauri/**'
      - 'Quill/ui/**'
      - 'Quill/package.json'

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Quill/src-tauri -> target

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install the Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install UI dependencies
        working-directory: Quill/ui
        run: npm install

      - name: Install Tauri CLI
        working-directory: Quill
        run: npm install

      - name: Build (Tauri)
        working-directory: Quill
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build

      - name: Publish DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: quill-latest
          name: Quill (latest)
          body: |
            Latest builds of Quill — updated automatically on every push.

            **macOS:** open the DMG, drag Quill to Applications.
            **Windows:** run the MSI installer.
          make_latest: true
          files: Quill/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Quill/src-tauri -> target

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install UI dependencies
        working-directory: Quill/ui
        run: npm install

      - name: Install Tauri CLI
        working-directory: Quill
        run: npm install

      - name: Build (Tauri)
        working-directory: Quill
        run: npx tauri build

      - name: Publish MSI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: quill-latest
          name: Quill (latest)
          body: |
            Latest builds of Quill — updated automatically on every push.

            **macOS:** open the DMG, drag Quill to Applications.
            **Windows:** run the MSI installer.
          make_latest: true
          files: Quill/src-tauri/target/release/bundle/msi/*.msi
