<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Inspections</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  #wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 16px 64px;
  }

  #search {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    outline: none;
    background: #fff;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: #888; }

  #results {
    margin-top: 20px;
  }

  .row {
    background: #fff;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .info { flex: 1; min-width: 0; }

  .name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .addr {
    font-size: 13px;
    color: #888;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .score {
    font-size: 17px;
    font-weight: 700;
    min-width: 40px;
    text-align: right;
  }

  .grade {
    font-size: 13px;
    font-weight: 700;
    width: 26px;
    height: 26px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grade-A { background: #e6f4ea; color: #1e7e34; }
  .grade-B { background: #fde8e8; color: #c0392b; }
  .grade-C { background: #fde8e8; color: #c0392b; }
  .grade-X { background: #eee;    color: #666; }

  .score-great { color: #1e7e34; }
  .score-meh   { color: #b8860b; }
  .score-bad   { color: #c0392b; }
  .score-awful { color: #c0392b; font-weight: 900; }

  #empty {
    text-align: center;
    color: #aaa;
    margin-top: 60px;
    font-size: 15px;
  }
</style>
</head>
<body>
<div id="wrap">
  <input id="search" type="search" placeholder="Search restaurants..." autocomplete="off" spellcheck="false">
  <div id="results"></div>
</div>

// ── RENDER ────────────────────────────────────────────────────────────────────
const search  = document.getElementById('search');
const results = document.getElementById('results');

// Pre-sort descending by score so filtered results always come out sorted
const sorted = [...DATA].sort((a, b) => b.s - a.s);

function gradeClass(g) {
  if (g === 'A') return 'grade-A';
  if (g === 'B') return 'grade-B';
  if (g === 'C') return 'grade-C';
  return 'grade-X';
}

function scoreClass(s) {
  if (s >= 96) return 'score-great';
  if (s >= 95) return 'score-meh';
  if (s >= 93) return 'score-bad';
  return 'score-awful';
}

function render(query) {
  if (!query) {
    results.innerHTML = '';
    return;
  }

  const tokens = query.toLowerCase().split(/\s+/).filter(Boolean);
  const matches = sorted.filter(r => {
    const name = r.n.toLowerCase();
    const addr = r.a.toLowerCase();
    return tokens.every(t => name.includes(t) || addr.includes(t));
  }).slice(0, 50);

  if (!matches.length) {
    results.innerHTML = '<div id="empty">No results</div>';
    return;
  }

  results.innerHTML = matches.map(r => `
    <div class="row">
      <div class="info">
        <div class="name">${esc(r.n)}</div>
        <div class="addr">${esc(r.a)}, ${esc(r.c)}, NC ${esc(r.z)}</div>
      </div>
      <div class="right">
        <div class="score ${scoreClass(r.s)}">${r.s}</div>
        <div class="grade ${gradeClass(r.g)}">${esc(r.g)}</div>
      </div>
    </div>`).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

search.addEventListener('input', () => render(search.value.trim()));
</script>
